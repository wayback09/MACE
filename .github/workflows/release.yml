name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'alpha-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
          - os: ubuntu-22.04
            platform: linux/amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform ${{ matrix.platform }}

      - name: Prepare Windows Asset
        if: runner.os == 'Windows'
        run: Rename-Item -Path "build\bin\mace.exe" -NewName "mace-windows-amd64.exe"

      - name: Prepare macOS Asset
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r mace-macos-universal.zip mace.app

      - name: Prepare Linux Asset
        if: runner.os == 'Linux'
        run: mv build/bin/mace build/bin/mace-linux-amd64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/mace-windows-amd64.exe
            build/bin/mace-macos-universal.zip
            build/bin/mace-linux-amd64
