name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: write

jobs:
  generate-tag:
    name: Generate Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.generate.outputs.new_tag }}
      is_prerelease: ${{ steps.generate.outputs.is_prerelease }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags

      - name: Generate Next Version Tag
        id: generate
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          
          # Get all existing tags
          TAGS=$(git tag -l | sort -V)
          
          # Find the latest tag of each type
          LATEST_ALPHA=$(echo "$TAGS" | grep -E '^alpha-v' | tail -1)
          LATEST_BETA=$(echo "$TAGS" | grep -E '^beta-v' | tail -1)
          LATEST_RELEASE=$(echo "$TAGS" | grep -E '^v[0-9]+' | grep -v alpha | grep -v beta | tail -1)
          
          echo "Latest alpha: $LATEST_ALPHA"
          echo "Latest beta: $LATEST_BETA"
          echo "Latest release: $LATEST_RELEASE"
          
          # Function to bump version
          bump_version() {
            local version=$1
            local part=$2
            
            # Extract version numbers (e.g., v1.0.0 -> 1.0.0)
            version=${version#*v}
            
            IFS='.' read -ra PARTS <<< "$version"
            MAJOR=${PARTS[0]}
            MINOR=${PARTS[1]:-0}
            PATCH=${PARTS[2]:-0}
            
            if [ "$part" == "major" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [ "$part" == "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            
            echo "$MAJOR.$MINOR.$PATCH"
          }
          
          if [ "$RELEASE_TYPE" == "alpha" ]; then
            if [ -z "$LATEST_ALPHA" ]; then
              # First alpha, start from 1.0.0
              NEW_VERSION="1.0.0"
            else
              # Bump patch version for alpha
              NEW_VERSION=$(bump_version "$LATEST_ALPHA" "patch")
            fi
            NEW_TAG="alpha-v$NEW_VERSION"
            IS_PRERELEASE="true"
            
          elif [ "$RELEASE_TYPE" == "beta" ]; then
            if [ -z "$LATEST_BETA" ]; then
              # Transitioning from alpha to beta - use last alpha's base version
              if [ -n "$LATEST_ALPHA" ]; then
                NEW_VERSION=$(bump_version "$LATEST_ALPHA" "patch")
              else
                NEW_VERSION="1.0.0"
              fi
            else
              # Bump patch version for beta
              NEW_VERSION=$(bump_version "$LATEST_BETA" "patch")
            fi
            NEW_TAG="beta-v$NEW_VERSION"
            IS_PRERELEASE="true"
            
          else  # release
            if [ -z "$LATEST_RELEASE" ]; then
              # First release, use 1.0.0
              NEW_VERSION="1.0.0"
            else
              # Bump patch version for release
              NEW_VERSION=$(bump_version "$LATEST_RELEASE" "patch")
            fi
            NEW_TAG="v$NEW_VERSION"
            IS_PRERELEASE="false"
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG (prerelease: $IS_PRERELEASE)"

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: generate-tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: mace-windows-amd64.exe
          - os: macos-latest
            platform: darwin/universal
            artifact: mace-macos-universal.zip
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: mace-linux-amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform ${{ matrix.platform }}

      - name: Prepare Windows Asset
        if: runner.os == 'Windows'
        run: Rename-Item -Path "build/bin/mace.exe" -NewName "mace-windows-amd64.exe"

      - name: Prepare macOS Asset
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r mace-macos-universal.zip mace.app

      - name: Prepare Linux Asset
        if: runner.os == 'Linux'
        run: mv build/bin/mace build/bin/mace-linux-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release and Tag
    runs-on: ubuntu-latest
    needs: [generate-tag, build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          mv artifacts/mace-windows-amd64.exe/mace-windows-amd64.exe release/ || true
          mv artifacts/mace-macos-universal.zip/mace-macos-universal.zip release/ || true
          mv artifacts/mace-linux-amd64/mace-linux-amd64 release/ || true
          ls -la release/

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ needs.generate-tag.outputs.new_tag }}
          git push origin ${{ needs.generate-tag.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.generate-tag.outputs.new_tag }}
          files: release/*
          prerelease: ${{ needs.generate-tag.outputs.is_prerelease }}
          body: |
            Release: ${{ needs.generate-tag.outputs.new_tag }}
            
            ### Artifacts
            - Windows: `mace-windows-amd64.exe`
            - macOS: `mace-macos-universal.zip`
            - Linux: `mace-linux-amd64`
